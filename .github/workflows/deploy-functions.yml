name: Deploy Edge Functions

on:
  push:
    branches: [main, master]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy whatsapp-webhook-inbound --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy conversation-handle --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy whatsapp-dispatch --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy lead-notify-broker --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy qr-resolve --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
